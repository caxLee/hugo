<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}" dir="{{ default `ltr` .Language.LanguageDirection }}">
    <head>
        {{- partial "head/head.html" . -}}
        {{- block "head" . -}}{{ end }}
        <style>
            /* 强制水平布局样式 - 全局应用 */
            .custom-horizontal-layout {
                display: flex !important;
                flex-direction: row !important;
                align-items: stretch !important;
                overflow: hidden !important;
            }
            .custom-horizontal-layout .article-image {
                flex: 1 0 33% !important; 
                max-width: 33% !important;
                margin-right: 2% !important;
                height: auto !important;
                min-height: 200px !important;
                position: relative !important;
            }
            .custom-horizontal-layout .article-image img {
                width: 100% !important;
                height: 100% !important;
                object-fit: cover !important;
                position: absolute !important;
                top: 0 !important;
                left: 0 !important;
            }
            .custom-horizontal-layout .article-details {
                flex: 2 0 65% !important;
                display: flex !important;
                flex-direction: column !important;
                padding: 1rem !important;
            }
            @media (max-width: 768px) {
                .custom-horizontal-layout {
                    flex-direction: column !important;
                }
                .custom-horizontal-layout .article-image {
                    flex: 0 0 100% !important;
                    max-width: 100% !important;
                    margin-right: 0 !important;
                    height: 200px !important;
                }
                .custom-horizontal-layout .article-details {
                    flex: 0 0 100% !important;
                }
            }
            
            .article-modal {
                display: none;
                position: fixed;
                z-index: 1000;
                left: 0;
                top: 0;
                width: 100%;
                height: 100%;
                overflow: auto;
                background-color: rgba(0,0,0,0.4);
            }
            .article-modal.is-active {
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .modal-content-wrapper {
                background-color: var(--card-background);
                color: var(--card-text-color);
                margin: auto;
                padding: 20px;
                border: 1px solid var(--border-color);
                width: 80%;
                max-width: 800px;
                max-height: 80vh;
                overflow-y: auto;
                border-radius: var(--card-border-radius);
            }
            body.modal-open {
                overflow: hidden;
            }
            .article-tags {
                margin-top: 1rem;
            }
            .article-tags .article-tags-list {
                list-style: none;
                padding: 0;
                margin: 0;
                display: inline-flex;
                flex-wrap: wrap;
                gap: 0.5rem;
            }
            .article-tags .article-tags-list-item a {
                display: inline-block;
                background: var(--tertiary-background-color);
                color: var(--secondary-text-color);
                padding: 0.25rem 0.75rem;
                border-radius: var(--card-border-radius);
                font-size: 0.875rem;
                text-decoration: none;
                transition: background-color 0.2s, color 0.2s;
            }
            .article-tags .article-tags-list-item a:hover {
                background: var(--theme-color);
                color: var(--background-color);
            }
        </style>
    </head>
    <body class="{{ block `body-class` . }}{{ end }} simplified-layout">
        {{- partial "head/colorScheme" . -}}
        
        {{- partial "top-header.html" . -}}

        <div class="container main-container">
            <main class="main full-width">
                {{- block "main" . }}{{- end }}
            </main>
        </div>
        {{ partial "footer/include.html" . }}

        <div id="article-modal" class="article-modal">
            <div class="modal-content-wrapper">
                <div id="modal-content"></div>
            </div>
        </div>
    </body>
</html>
