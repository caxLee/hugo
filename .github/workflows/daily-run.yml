name: Daily Article Generation and Hugo Build

on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *' # Runs at 22:00 UTC every day

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Tools Repo
        uses: actions/checkout@v3
        with:
          path: scraper_tool

      - name: Checkout Hugo Source Repo
        uses: actions/checkout@v3
        with:
          repository: ${{ secrets.HUGO_REPO }} # e.g., 'your-username/your-hugo-site-repo'
          token: ${{ secrets.GH_PAT }} # A personal access token with repo scope
          path: hugo_source

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper_tool/blogdata/requirements.txt
        shell: bash

      - name: Install Playwright Browsers
        run: playwright install --with-deps
        working-directory: ./scraper_tool
        shell: bash
        
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'

      - name: Run Scripts
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          HUGO_PROJECT_PATH: ${{ github.workspace }}/hugo_source
        run: |
          python scraper_tool/blogdata/run_all_daily.py
          python scraper_tool/blogdata/auto_push_github.py
        shell: bash 